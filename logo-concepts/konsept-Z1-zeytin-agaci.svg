<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0E1A16"/>

  <!-- Olive tree — stylized, golden, detailed branches and leaves -->
  <g transform="translate(400, 118)">
    <!-- Trunk -->
    <path d="M0,65 C-2,55 -3,40 -4,30 C-5,20 -3,10 -2,0 C-1,-5 0,-8 0,-10" fill="none" stroke="#C3A564" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Root hints -->
    <path d="M-4,62 C-10,68 -14,70 -18,69" fill="none" stroke="#C3A564" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <path d="M2,64 C8,70 12,71 16,70" fill="none" stroke="#C3A564" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

    <!-- Main branches -->
    <path d="M0,-10 C-8,-18 -20,-24 -30,-22" fill="none" stroke="#C3A564" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M0,-10 C8,-20 22,-26 32,-24" fill="none" stroke="#C3A564" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M-2,-6 C-14,-14 -26,-12 -35,-8" fill="none" stroke="#C3A564" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M2,-6 C14,-14 28,-14 36,-10" fill="none" stroke="#C3A564" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M0,-12 C-4,-22 -10,-32 -18,-36" fill="none" stroke="#C3A564" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M0,-12 C4,-22 12,-34 20,-38" fill="none" stroke="#C3A564" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M0,-14 C0,-26 2,-38 0,-46" fill="none" stroke="#C3A564" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Olive leaves (small ellipses along branches) -->
    <!-- Left branches -->
    <ellipse cx="-32" cy="-22" rx="6" ry="2.5" transform="rotate(-20,-32,-22)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="-28" cy="-26" rx="5" ry="2" transform="rotate(10,-28,-26)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="-24" cy="-18" rx="5" ry="2" transform="rotate(-30,-24,-18)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="-36" cy="-10" rx="6" ry="2.5" transform="rotate(-15,-36,-10)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="-32" cy="-4" rx="5" ry="2" transform="rotate(15,-32,-4)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="-38" cy="-14" rx="5" ry="2" transform="rotate(25,-38,-14)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="-20" cy="-36" rx="5" ry="2" transform="rotate(-40,-20,-36)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="-14" cy="-34" rx="5" ry="2" transform="rotate(20,-14,-34)" fill="none" stroke="#C3A564" stroke-width="0.7"/>

    <!-- Right branches -->
    <ellipse cx="34" cy="-24" rx="6" ry="2.5" transform="rotate(20,34,-24)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="30" cy="-28" rx="5" ry="2" transform="rotate(-10,30,-28)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="26" cy="-20" rx="5" ry="2" transform="rotate(30,26,-20)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="38" cy="-12" rx="6" ry="2.5" transform="rotate(15,38,-12)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="34" cy="-6" rx="5" ry="2" transform="rotate(-15,34,-6)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="22" cy="-38" rx="5" ry="2" transform="rotate(40,22,-38)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="16" cy="-36" rx="5" ry="2" transform="rotate(-20,16,-36)" fill="none" stroke="#C3A564" stroke-width="0.7"/>

    <!-- Top -->
    <ellipse cx="0" cy="-48" rx="5" ry="2" transform="rotate(0,0,-48)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="-6" cy="-44" rx="5" ry="2" transform="rotate(-30,-6,-44)" fill="none" stroke="#C3A564" stroke-width="0.7"/>
    <ellipse cx="6" cy="-44" rx="5" ry="2" transform="rotate(30,6,-44)" fill="none" stroke="#C3A564" stroke-width="0.7"/>

    <!-- Small olives (fruits) -->
    <ellipse cx="-26" cy="-14" rx="2" ry="2.8" fill="#C3A564" opacity="0.4"/>
    <ellipse cx="30" cy="-16" rx="2" ry="2.8" fill="#C3A564" opacity="0.4"/>
    <ellipse cx="-16" cy="-30" rx="2" ry="2.8" fill="#C3A564" opacity="0.4"/>
    <ellipse cx="10" cy="-40" rx="2" ry="2.8" fill="#C3A564" opacity="0.35"/>
  </g>

  <text x="400" y="270" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="58" font-weight="400" letter-spacing="16" fill="#EBE8E1">VERDE</text>
  <line x1="335" y1="290" x2="465" y2="290" stroke="#C3A564" stroke-width="0.7"/>
  <text x="400" y="318" text-anchor="middle" font-family="'Inter',sans-serif" font-size="16" font-weight="300" letter-spacing="11" fill="rgba(235,232,225,0.4)">ULASLI</text>
  <text x="400" y="360" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="13" font-style="italic" fill="rgba(195,165,100,0.35)">Where the mist reveals</text>

  <text x="400" y="475" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" letter-spacing="3" fill="rgba(235,232,225,0.12)">Z1 : ZEYTIN AGACI — TAM AGAC</text>
</svg>
