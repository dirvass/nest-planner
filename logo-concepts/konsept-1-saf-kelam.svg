<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0E1A16"/>

  <!-- VERDE wordmark -->
  <text x="400" y="170" text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="72" font-weight="400" letter-spacing="18" fill="#EBE8E1">
    VERDE
  </text>

  <!-- Thin gold line -->
  <line x1="330" y1="195" x2="470" y2="195" stroke="#C3A564" stroke-width="0.8"/>

  <!-- ULASLI subtitle -->
  <text x="400" y="235" text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
