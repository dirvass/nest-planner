<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0E1A16"/>

  <!-- Bilingual seal: VERDE in Latin, وردة in Arabic, circular stamp -->
  <g transform="translate(400, 170)">
    <!-- Outer circle -->
    <circle r="72" fill="none" stroke="#C3A564" stroke-width="1"/>
    <!-- Inner circle -->
    <circle r="65" fill="none" stroke="rgba(195,165,100,0.2)" stroke-width="0.5"/>
    <!-- Decorative dots on the circle (8 points, like Islamic geometry) -->
    <circle cx="0" cy="-68.5" r="1.5" fill="#C3A564" opacity="0.5"/>
    <circle cx="48.5" cy="-48.5" r="1.5" fill="#C3A564" opacity="0.5"/>
    <circle cx="68.5" cy="0" r="1.5" fill="#C3A564" opacity="0.5"/>
    <circle cx="48.5" cy="48.5" r="1.5" fill="#C3A564" opacity="0.5"/>
    <circle cx="0" cy="68.5" r="1.5" fill="#C3A564" opacity="0.5"/>
    <circle cx="-48.5" cy="48.5" r="1.5" fill="#C3A564" opacity="0.5"/>
    <circle cx="-68.5" cy="0" r="1.5" fill="#C3A564" opacity="0.5"/>
    <circle cx="-48.5" cy="-48.5" r="1.5" fill="#C3A564" opacity="0.5"/>

    <!-- وردة Arabic (top half of circle) -->
    <text x="0" y="-18" text-anchor="middle"
      font-family="'Noto Sans Arabic', 'Traditional Arabic', serif"
      font-size="28" font-weight="400" fill="#C3A564" opacity="0.7">
      وردة
    </text>

    <!-- Thin divider line -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="rgba(235,232,225,0.15)" stroke-width="0.5"/>

    <!-- V monogram (bottom half) -->
    <text x="0" y="35" text-anchor="middle"
      font-family="'Playfair Display', 'Georgia', serif"
      font-size="36" font-weight="400" letter-spacing="2" fill="#EBE8E1">
      V
    </text>
  </g>

  <!-- VERDE ULASLI wordmark below seal -->
  <text x="400" y="310" text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="42" font-weight="400" letter-spacing="12" fill="#EBE8E1">
    VERDE
  </text>

  <text x="400" y="340" text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="14" font-weight="300" letter-spacing="10" fill="rgba(235,232,225,0.4)">
    ULASLI
  </text>

  <!-- Tagline -->
  <text x="400" y="385" text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="11" font-weight="400" font-style="italic" letter-spacing="1" fill="rgba(195,165,100,0.3)">
    Where the mist reveals
  </text>

  <!-- Label -->
  <text x="400" y="470" text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-size="9" font-weight="400" letter-spacing="3" fill="rgba(235,232,225,0.15)">
    KONSEPT 8 : CIFT DIL MUHUR
  </text>
</svg>
