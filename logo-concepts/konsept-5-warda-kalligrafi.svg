<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0E1A16"/>

  <!-- Arabic وردة (warda) as decorative element above VERDE -->
  <text x="400" y="120" text-anchor="middle"
    font-family="'Noto Sans Arabic', 'Traditional Arabic', serif"
    font-size="42" font-weight="300" fill="#C3A564" opacity="0.5" letter-spacing="4">
    وردة
  </text>

  <!-- Small rose-inspired dot between Arabic and Latin -->
  <circle cx="400" cy="148" r="2" fill="#C3A564" opacity="0.4"/>

  <!-- VERDE wordmark -->
  <text x="400" y="210" text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="68" font-weight="400" letter-spacing="16" fill="#EBE8E1">
    VERDE
  </text>

  <!-- Thin gold line -->
  <line x1="330" y1="230" x2="470" y2="230" stroke="#C3A564" stroke-width="0.8"/>

  <!-- ULASLI subtitle -->
  <text x="400" y="265" text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="16" font-weight="300" letter-spacing="11" fill="rgba(235,232,225,0.45)">
    ULASLI
  </text>

  <!-- Tagline -->
  <text x="400" y="320" text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="12" font-weight="400" font-style="italic" letter-spacing="1" fill="rgba(195,165,100,0.35)">
    Where the mist reveals
  </text>

  <!-- Arabic tagline -->
  <text x="400" y="350" text-anchor="middle"
    font-family="'Noto Sans Arabic', serif"
    font-size="11" font-weight="300" fill="rgba(195,165,100,0.25)" letter-spacing="1">
    حيث ينكشف الضباب
  </text>

  <!-- Label -->
  <text x="400" y="470" text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-size="9" font-weight="400" letter-spacing="3" fill="rgba(235,232,225,0.15)">
    KONSEPT 5 : WARDA KALLIGRAFI
  </text>
</svg>
