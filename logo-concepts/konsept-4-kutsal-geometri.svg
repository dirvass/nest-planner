<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0E1A16"/>

  <!-- Sacred geometry symbol: 8-pointed star (two overlapping squares) with organic leaf center -->
  <g transform="translate(400, 145)">
    <!-- Outer glow -->
    <circle r="65" fill="none" stroke="rgba(195,165,100,0.06)" stroke-width="20"/>

    <!-- First rotated square (45deg) -->
    <rect x="-42" y="-42" width="84" height="84" rx="3"
      transform="rotate(0)"
      fill="none" stroke="#2D5040" stroke-width="1"/>

    <!-- Second rotated square (making 8-pointed star) -->
    <rect x="-42" y="-42" width="84" height="84" rx="3"
      transform="rotate(45)"
      fill="none" stroke="#C3A564" stroke-width="1"/>

    <!-- Inner octagon -->
    <polygon points="0,-35 25,-25 35,0 25,25 0,35 -25,25 -35,0 -25,-25"
      fill="none" stroke="rgba(195,165,100,0.15)" stroke-width="0.5"/>

    <!-- Central leaf form (organic within geometric) -->
    <path d="M0,-20 C8,-16 14,-8 14,0 C14,8 8,16 0,20 C-8,16 -14,8 -14,0 C-14,-8 -8,-16 0,-20 Z"
      fill="none" stroke="#C9B99A" stroke-width="0.8"/>
    <!-- Leaf vein -->
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#C9B99A" stroke-width="0.5"/>
    <line x1="0" y1="-8" x2="8" y2="-2" stroke="#C9B99A" stroke-width="0.3" opacity="0.6"/>
    <line x1="0" y1="-8" x2="-8" y2="-2" stroke="#C9B99A" stroke-width="0.3" opacity="0.6"/>
    <line x1="0" y1="4" x2="7" y2="10" stroke="#C9B99A" stroke-width="0.3" opacity="0.6"/>
    <line x1="0" y1="4" x2="-7" y2="10" stroke="#C9B99A" stroke-width="0.3" opacity="0.6"/>

    <!-- Center seed -->
    <circle r="2.5" fill="#C3A564"/>
  </g>

  <!-- VERDE wordmark -->
  <text x="400" y="275" text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="48" font-weight="400" letter-spacing="14" fill="#EBE8E1">
    VERDE
  </text>

  <!-- ULASLI subtitle -->
  <text x="400" y="308" text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', sans-serif"
    font-size="15" font-weight="300" letter-spacing="10" fill="rgba(235,232,225,0.4)">
    ULASLI
  </text>

  <!-- Tagline -->
  <text x="400" y="358" text-anchor="middle"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="12" font-weight="400" font-style="italic" letter-spacing="1" fill="rgba(195,165,100,0.35)">
    Where the mist reveals
  </text>

  <!-- Pattern sample (bottom, repeating tile hint) -->
  <g transform="translate(100, 430) scale(0.2)" opacity="0.08">
    <rect x="-42" y="-42" width="84" height="84" rx="3" fill="none" stroke="#C3A564" stroke-width="2"/>
    <rect x="-42" y="-42" width="84" height="84" rx="3" transform="rotate(45)" fill="none" stroke="#C3A564" stroke-width="2"/>
  </g>
  <g transform="translate(160, 430) scale(0.2)" opacity="0.08">
    <rect x="-42" y="-42" width="84" height="84" rx="3" fill="none" stroke="#C3A564" stroke-width="2"/>
    <rect x="-42" y="-42" width="84" height="84" rx="3" transform="rotate(45)" fill="none" stroke="#C3A564" stroke-width="2"/>
  </g>
  <g transform="translate(220, 430) scale(0.2)" opacity="0.08">
    <rect x="-42" y="-42" width="84" height="84" rx="3" fill="none" stroke="#C3A564" stroke-width="2"/>
    <rect x="-42" y="-42" width="84" height="84" rx="3" transform="rotate(45)" fill="none" stroke="#C3A564" stroke-width="2"/>
  </g>

  <!-- Label -->
  <text x="400" y="470" text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-size="9" font-weight="400" letter-spacing="3" fill="rgba(235,232,225,0.15)">
    KONSEPT 4 : KUTSAL GEOMETRI
  </text>
</svg>
