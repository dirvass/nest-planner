<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0E1A16"/>

  <!-- Rose seal: circular stamp with stylized rose in center, VERDE ULASLI around the edge -->
  <g transform="translate(400, 168)">
    <!-- Outer ring -->
    <circle r="78" fill="none" stroke="#C3A564" stroke-width="1"/>
    <!-- Inner ring -->
    <circle r="72" fill="none" stroke="rgba(195,165,100,0.25)" stroke-width="0.5"/>

    <!-- Circular text: VERDE top -->
    <path id="top-arc" d="M-55,-45 A72,72 0 0,1 55,-45" fill="none"/>
    <text font-family="'Inter',sans-serif" font-size="9" font-weight="500" letter-spacing="8" fill="rgba(235,232,225,0.45)">
      <textPath href="#top-arc" startOffset="50%" text-anchor="middle">VERDE</textPath>
    </text>

    <!-- Circular text: ULASLI bottom -->
    <path id="bot-arc" d="M55,50 A72,72 0 0,1 -55,50" fill="none"/>
    <text font-family="'Inter',sans-serif" font-size="9" font-weight="500" letter-spacing="8" fill="rgba(235,232,225,0.45)">
      <textPath href="#bot-arc" startOffset="50%" text-anchor="middle">ULASLI</textPath>
    </text>

    <!-- Dot separators on sides -->
    <circle cx="-68" cy="0" r="1.5" fill="#C3A564" opacity="0.5"/>
    <circle cx="68" cy="0" r="1.5" fill="#C3A564" opacity="0.5"/>

    <!-- Central rose (6 petals, viewed from above) -->
    <g>
      <path d="M0,-24 C7,-20 10,-12 8,-4 C6,2 2,5 0,6 C-2,5 -6,2 -8,-4 C-10,-12 -7,-20 0,-24Z" transform="rotate(0)" fill="none" stroke="#C3A564" stroke-width="0.9"/>
      <path d="M0,-24 C7,-20 10,-12 8,-4 C6,2 2,5 0,6 C-2,5 -6,2 -8,-4 C-10,-12 -7,-20 0,-24Z" transform="rotate(60)" fill="none" stroke="#C3A564" stroke-width="0.9"/>
      <path d="M0,-24 C7,-20 10,-12 8,-4 C6,2 2,5 0,6 C-2,5 -6,2 -8,-4 C-10,-12 -7,-20 0,-24Z" transform="rotate(120)" fill="none" stroke="#C3A564" stroke-width="0.9"/>
      <path d="M0,-24 C7,-20 10,-12 8,-4 C6,2 2,5 0,6 C-2,5 -6,2 -8,-4 C-10,-12 -7,-20 0,-24Z" transform="rotate(180)" fill="none" stroke="#C3A564" stroke-width="0.9"/>
      <path d="M0,-24 C7,-20 10,-12 8,-4 C6,2 2,5 0,6 C-2,5 -6,2 -8,-4 C-10,-12 -7,-20 0,-24Z" transform="rotate(240)" fill="none" stroke="#C3A564" stroke-width="0.9"/>
      <path d="M0,-24 C7,-20 10,-12 8,-4 C6,2 2,5 0,6 C-2,5 -6,2 -8,-4 C-10,-12 -7,-20 0,-24Z" transform="rotate(300)" fill="none" stroke="#C3A564" stroke-width="0.9"/>
    </g>

    <!-- Inner bud -->
    <circle r="5" fill="none" stroke="#C9B99A" stroke-width="0.5"/>
    <circle r="2" fill="#C3A564"/>
  </g>

  <!-- Wordmark below -->
  <text x="400" y="315" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="44" font-weight="400" letter-spacing="12" fill="#EBE8E1">VERDE</text>
  <text x="400" y="345" text-anchor="middle" font-family="'Inter',sans-serif" font-size="14" font-weight="300" letter-spacing="10" fill="rgba(235,232,225,0.4)">ULASLI</text>

  <text x="400" y="470" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" letter-spacing="3" fill="rgba(235,232,225,0.15)">E : GUL MUHUR — DAMGA / SEAL</text>
</svg>
