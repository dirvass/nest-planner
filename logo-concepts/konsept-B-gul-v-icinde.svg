<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0E1A16"/>

  <!-- V letterform with a rose blooming from inside -->
  <g transform="translate(400, 140)">
    <!-- V shape -->
    <path d="M-32,-42 L-6,42 C-3,50 0,52 0,52 C0,52 3,50 6,42 L32,-42"
      fill="none" stroke="#EBE8E1" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Rose petals emerging from V center -->
    <!-- Petal 1 up-left -->
    <path d="M-4,-5 C-14,-18 -10,-32 -2,-28 C4,-25 2,-12 -4,-5Z" fill="none" stroke="#C3A564" stroke-width="0.8"/>
    <!-- Petal 2 up-right -->
    <path d="M4,-5 C14,-18 10,-32 2,-28 C-4,-25 -2,-12 4,-5Z" fill="none" stroke="#C3A564" stroke-width="0.8"/>
    <!-- Petal 3 center -->
    <path d="M0,-8 C-5,-20 -3,-30 0,-32 C3,-30 5,-20 0,-8Z" fill="none" stroke="#C9B99A" stroke-width="0.6" opacity="0.7"/>
    <!-- Petal 4 left wide -->
    <path d="M-6,0 C-20,-8 -24,-22 -16,-26 C-10,-22 -8,-8 -6,0Z" fill="none" stroke="#C3A564" stroke-width="0.7" opacity="0.5"/>
    <!-- Petal 5 right wide -->
    <path d="M6,0 C20,-8 24,-22 16,-26 C10,-22 8,-8 6,0Z" fill="none" stroke="#C3A564" stroke-width="0.7" opacity="0.5"/>

    <!-- Rose center -->
    <circle cx="0" cy="-4" r="2" fill="#C3A564"/>

    <!-- Subtle outer ring -->
    <circle r="56" fill="none" stroke="rgba(195,165,100,0.08)" stroke-width="0.5"/>
  </g>

  <text x="400" y="268" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="50" font-weight="400" letter-spacing="14" fill="#EBE8E1">VERDE</text>
  <line x1="345" y1="286" x2="455" y2="286" stroke="#C3A564" stroke-width="0.6"/>
  <text x="400" y="312" text-anchor="middle" font-family="'Inter',sans-serif" font-size="15" font-weight="300" letter-spacing="10" fill="rgba(235,232,225,0.4)">ULASLI</text>

  <text x="400" y="470" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" letter-spacing="3" fill="rgba(235,232,225,0.15)">B : GUL V'NIN ICINDEN ACILIYOR</text>
</svg>
