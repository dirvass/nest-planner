<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0E1A16"/>

  <!-- Olive wreath seal: two olive branches forming a circle, VERDE inside -->
  <g transform="translate(400, 160)">
    <!-- Left branch (curves up from bottom to top) -->
    <path d="M-5,52 C-20,40 -40,22 -46,0 C-50,-15 -44,-32 -30,-42 C-18,-50 -5,-52 0,-52" fill="none" stroke="#C3A564" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Right branch -->
    <path d="M5,52 C20,40 40,22 46,0 C50,-15 44,-32 30,-42 C18,-50 5,-52 0,-52" fill="none" stroke="#C3A564" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Left branch leaves -->
    <ellipse cx="-15" cy="42" rx="6" ry="2.2" transform="rotate(-60,-15,42)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-28" cy="30" rx="6" ry="2.2" transform="rotate(30,-28,30)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-38" cy="18" rx="6" ry="2.2" transform="rotate(-50,-38,18)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-44" cy="4" rx="6" ry="2.2" transform="rotate(20,-44,4)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-46" cy="-10" rx="6" ry="2.2" transform="rotate(-30,-46,-10)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-40" cy="-24" rx="6" ry="2.2" transform="rotate(40,-40,-24)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-30" cy="-38" rx="6" ry="2.2" transform="rotate(-20,-30,-38)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-16" cy="-48" rx="6" ry="2.2" transform="rotate(30,-16,-48)" fill="none" stroke="#C3A564" stroke-width="0.6"/>

    <!-- Right branch leaves -->
    <ellipse cx="15" cy="42" rx="6" ry="2.2" transform="rotate(60,15,42)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="28" cy="30" rx="6" ry="2.2" transform="rotate(-30,28,30)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="38" cy="18" rx="6" ry="2.2" transform="rotate(50,38,18)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="44" cy="4" rx="6" ry="2.2" transform="rotate(-20,44,4)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="46" cy="-10" rx="6" ry="2.2" transform="rotate(30,46,-10)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="40" cy="-24" rx="6" ry="2.2" transform="rotate(-40,40,-24)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="30" cy="-38" rx="6" ry="2.2" transform="rotate(20,30,-38)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="16" cy="-48" rx="6" ry="2.2" transform="rotate(-30,16,-48)" fill="none" stroke="#C3A564" stroke-width="0.6"/>

    <!-- Olives scattered -->
    <ellipse cx="-34" cy="10" rx="2" ry="3" fill="#C3A564" opacity="0.35"/>
    <ellipse cx="34" cy="10" rx="2" ry="3" fill="#C3A564" opacity="0.35"/>
    <ellipse cx="-20" cy="-40" rx="2" ry="3" fill="#C3A564" opacity="0.3"/>
    <ellipse cx="20" cy="-40" rx="2" ry="3" fill="#C3A564" opacity="0.3"/>

    <!-- V in center -->
    <text x="0" y="10" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="48" font-weight="400" letter-spacing="2" fill="#EBE8E1">V</text>
  </g>

  <text x="400" y="290" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="52" font-weight="400" letter-spacing="16" fill="#EBE8E1">VERDE</text>
  <line x1="340" y1="308" x2="460" y2="308" stroke="#C3A564" stroke-width="0.6"/>
  <text x="400" y="336" text-anchor="middle" font-family="'Inter',sans-serif" font-size="16" font-weight="300" letter-spacing="11" fill="rgba(235,232,225,0.4)">ULASLI</text>
  <text x="400" y="376" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="13" font-style="italic" fill="rgba(195,165,100,0.3)">Where the mist reveals</text>

  <text x="400" y="475" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" letter-spacing="3" fill="rgba(235,232,225,0.12)">Z4 : ZEYTIN MUHUR — CELENK + V</text>
</svg>
