<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0E1A16"/>

  <!-- Detailed olive tree — organic trunk, full rounded canopy, golden -->
  <g transform="translate(400, 108)">

    <!-- ══ TRUNK — gnarled, organic ══ -->
    <path d="M-2,72 C-4,65 -6,55 -7,45 C-8,35 -6,28 -5,22 C-4,16 -6,10 -8,4 C-9,-2 -7,-6 -4,-8"
      fill="none" stroke="#C3A564" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Trunk texture lines -->
    <path d="M-4,68 C-6,60 -8,50 -8,42" fill="none" stroke="#C3A564" stroke-width="0.5" opacity="0.3"/>
    <path d="M0,70 C-2,62 -4,52 -5,44" fill="none" stroke="#C3A564" stroke-width="0.5" opacity="0.3"/>

    <!-- Roots -->
    <path d="M-6,70 C-14,76 -20,78 -26,76" fill="none" stroke="#C3A564" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M-2,72 C4,78 10,80 16,78" fill="none" stroke="#C3A564" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M-4,71 C-8,76 -10,78 -14,77" fill="none" stroke="#C3A564" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

    <!-- ══ MAIN BRANCHES ══ -->
    <!-- Left main -->
    <path d="M-5,-4 C-12,-10 -24,-16 -34,-14 C-40,-12 -44,-8 -46,-4" fill="none" stroke="#C3A564" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M-8,2 C-18,-2 -30,0 -40,4 C-46,6 -50,10 -48,14" fill="none" stroke="#C3A564" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right main -->
    <path d="M-4,-8 C4,-14 16,-20 28,-18 C36,-16 42,-12 44,-8" fill="none" stroke="#C3A564" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M-2,-4 C8,-8 22,-6 34,-2 C42,0 46,4 44,8" fill="none" stroke="#C3A564" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Center up -->
    <path d="M-4,-8 C-4,-16 -2,-28 0,-36 C2,-42 4,-48 2,-52" fill="none" stroke="#C3A564" stroke-width="2" stroke-linecap="round"/>
    <!-- Sub branches -->
    <path d="M-6,-6 C-10,-14 -16,-24 -22,-30" fill="none" stroke="#C3A564" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M-3,-10 C2,-18 8,-28 14,-34" fill="none" stroke="#C3A564" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M-34,-14 C-36,-22 -34,-30 -28,-36" fill="none" stroke="#C3A564" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M28,-18 C32,-26 30,-34 24,-40" fill="none" stroke="#C3A564" stroke-width="1.2" stroke-linecap="round"/>

    <!-- ══ CANOPY — dense leaf clusters (rounded mass) ══ -->
    <!-- Each cluster is a group of overlapping small ellipses -->

    <!-- Left canopy cluster -->
    <ellipse cx="-46" cy="-6" rx="8" ry="5" transform="rotate(-10,-46,-6)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-50" cy="-2" rx="7" ry="4" transform="rotate(15,-50,-2)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-44" cy="-12" rx="7" ry="4" transform="rotate(-20,-44,-12)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-40" cy="-18" rx="7" ry="4" transform="rotate(10,-40,-18)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-48" cy="8" rx="7" ry="4" transform="rotate(-15,-48,8)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-50" cy="14" rx="6" ry="3.5" transform="rotate(20,-50,14)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-42" cy="6" rx="7" ry="4" transform="rotate(5,-42,6)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-36" cy="-24" rx="7" ry="4" transform="rotate(-25,-36,-24)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-30" cy="-32" rx="6" ry="3.5" transform="rotate(15,-30,-32)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-34" cy="-8" rx="6" ry="3" transform="rotate(-5,-34,-8)" fill="none" stroke="#C3A564" stroke-width="0.6"/>

    <!-- Center canopy cluster -->
    <ellipse cx="-24" cy="-34" rx="7" ry="4" transform="rotate(-15,-24,-34)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-16" cy="-40" rx="7" ry="4" transform="rotate(10,-16,-40)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-8" cy="-46" rx="7" ry="4" transform="rotate(-20,-8,-46)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="0" cy="-52" rx="7" ry="4" transform="rotate(5,0,-52)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="0" cy="-44" rx="6" ry="3.5" transform="rotate(-10,0,-44)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-6" cy="-36" rx="6" ry="3.5" transform="rotate(15,-6,-36)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="6" cy="-48" rx="6" ry="3.5" transform="rotate(-15,6,-48)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="-12" cy="-28" rx="7" ry="4" transform="rotate(20,-12,-28)" fill="none" stroke="#C3A564" stroke-width="0.6"/>

    <!-- Right canopy cluster -->
    <ellipse cx="10" cy="-38" rx="7" ry="4" transform="rotate(10,10,-38)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="18" cy="-42" rx="7" ry="4" transform="rotate(-15,18,-42)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="26" cy="-38" rx="7" ry="4" transform="rotate(20,26,-38)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="30" cy="-30" rx="7" ry="4" transform="rotate(-10,30,-30)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="36" cy="-22" rx="7" ry="4" transform="rotate(15,36,-22)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="42" cy="-14" rx="7" ry="4" transform="rotate(-20,42,-14)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="44" cy="-6" rx="7" ry="4" transform="rotate(10,44,-6)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="46" cy="2" rx="7" ry="4" transform="rotate(-15,46,2)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="44" cy="10" rx="6" ry="3.5" transform="rotate(20,44,10)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="38" cy="-4" rx="6" ry="3" transform="rotate(5,38,-4)" fill="none" stroke="#C3A564" stroke-width="0.6"/>
    <ellipse cx="20" cy="-28" rx="6" ry="3.5" transform="rotate(-25,20,-28)" fill="none" stroke="#C3A564" stroke-width="0.6"/>

    <!-- ══ OLIVES (small filled ellipses) ══ -->
    <ellipse cx="-38" cy="-2" rx="2.5" ry="3.5" fill="#C3A564" opacity="0.35"/>
    <ellipse cx="-28" cy="-20" rx="2.5" ry="3.5" fill="#C3A564" opacity="0.3"/>
    <ellipse cx="-14" cy="-32" rx="2.5" ry="3.5" fill="#C3A564" opacity="0.3"/>
    <ellipse cx="4" cy="-40" rx="2.5" ry="3.5" fill="#C3A564" opacity="0.3"/>
    <ellipse cx="22" cy="-34" rx="2.5" ry="3.5" fill="#C3A564" opacity="0.3"/>
    <ellipse cx="36" cy="-16" rx="2.5" ry="3.5" fill="#C3A564" opacity="0.35"/>
    <ellipse cx="40" cy="6" rx="2.5" ry="3.5" fill="#C3A564" opacity="0.3"/>
    <ellipse cx="-44" cy="10" rx="2.5" ry="3.5" fill="#C3A564" opacity="0.3"/>
  </g>

  <!-- ══ WORDMARK ══ -->
  <text x="400" y="268" text-anchor="middle"
    font-family="'Playfair Display',Georgia,serif"
    font-size="60" font-weight="400" letter-spacing="18" fill="#EBE8E1">
    VERDE
  </text>

  <!-- Gold line -->
  <line x1="332" y1="288" x2="468" y2="288" stroke="#C3A564" stroke-width="0.8"/>

  <!-- ULASLI -->
  <text x="400" y="318" text-anchor="middle"
    font-family="'Inter','Helvetica Neue',sans-serif"
    font-size="17" font-weight="300" letter-spacing="12" fill="rgba(235,232,225,0.45)">
    ULASLI
  </text>

  <!-- Tagline -->
  <text x="400" y="362" text-anchor="middle"
    font-family="'Playfair Display',Georgia,serif"
    font-size="14" font-weight="400" font-style="italic" letter-spacing="1" fill="rgba(195,165,100,0.35)">
    Where the mist reveals
  </text>
</svg>
