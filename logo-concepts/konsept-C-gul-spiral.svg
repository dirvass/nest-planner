<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0E1A16"/>

  <!-- Abstract rose as a spiral — like a fingerprint of nature -->
  <g transform="translate(400, 130)">
    <!-- Spiral rose — concentric curves that suggest petals -->
    <path d="M0,0 C4,-6 10,-8 14,-5" fill="none" stroke="#C3A564" stroke-width="1" stroke-linecap="round"/>
    <path d="M14,-5 C18,-1 18,6 12,10" fill="none" stroke="#C3A564" stroke-width="1" stroke-linecap="round"/>
    <path d="M12,10 C6,14 -2,14 -8,8" fill="none" stroke="#C3A564" stroke-width="1" stroke-linecap="round"/>
    <path d="M-8,8 C-14,2 -14,-8 -6,-14" fill="none" stroke="#C3A564" stroke-width="1" stroke-linecap="round"/>
    <path d="M-6,-14 C2,-20 14,-20 22,-12" fill="none" stroke="#C3A564" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M22,-12 C30,-4 30,12 20,20" fill="none" stroke="#C3A564" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M20,20 C10,28 -8,28 -18,18" fill="none" stroke="#C9B99A" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M-18,18 C-28,8 -28,-10 -18,-22" fill="none" stroke="#C9B99A" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M-18,-22 C-8,-34 16,-36 28,-24" fill="none" stroke="#C9B99A" stroke-width="0.7" stroke-linecap="round" opacity="0.7"/>
    <path d="M28,-24 C40,-12 40,16 28,30" fill="none" stroke="#C9B99A" stroke-width="0.7" stroke-linecap="round" opacity="0.7"/>
    <path d="M28,30 C16,42 -14,42 -28,28" fill="none" stroke="rgba(201,185,154,0.4)" stroke-width="0.6" stroke-linecap="round"/>
    <path d="M-28,28 C-42,14 -42,-16 -28,-32" fill="none" stroke="rgba(201,185,154,0.4)" stroke-width="0.6" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle r="1.5" fill="#C3A564"/>
  </g>

  <text x="400" y="250" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="56" font-weight="400" letter-spacing="16" fill="#EBE8E1">VERDE</text>
  <line x1="340" y1="268" x2="460" y2="268" stroke="#C3A564" stroke-width="0.6"/>
  <text x="400" y="296" text-anchor="middle" font-family="'Inter',sans-serif" font-size="15" font-weight="300" letter-spacing="11" fill="rgba(235,232,225,0.4)">ULASLI</text>

  <text x="400" y="470" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" letter-spacing="3" fill="rgba(235,232,225,0.15)">C : GUL SPIRAL — DOGANIN PARMAK IZI</text>
</svg>
